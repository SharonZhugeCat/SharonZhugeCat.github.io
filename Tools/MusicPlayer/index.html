<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器 - Sharon的个人网站</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap">
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            background: linear-gradient(120deg, rgb(133, 62, 255), #f76cc6 30%, rgb(255, 255, 255) 60%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            width: 100%;
        }

        .sidebar {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-right: 20px;
        }

        .library-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .platform-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .platform-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            min-width: 100px;
            text-align: center;
        }

        .platform-btn.active {
            background: linear-gradient(135deg, #f76cc6, #a770ef);
            box-shadow: 0 4px 15px rgba(247, 108, 198, 0.3);
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(247, 108, 198, 0.8);
            box-shadow: 0 0 0 3px rgba(247, 108, 198, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-btn {
            background: linear-gradient(135deg, #f76cc6, #a770ef);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(247, 108, 198, 0.3);
        }

        .song-list {
            display: grid;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 0 5px;
            width: 100%;
            box-sizing: border-box;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .song-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .song-artist {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .song-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 8px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .player-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }

        .player-controls-inner {
            width: 85%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s ease;
        }

        .progress-bar:hover {
            height: 10px;
        }

        .progress-bar:active {
            height: 8px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #f76cc6, #a770ef);
            border-radius: 2px;
            width: 0%;
        }

        .time-info {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .play-mode-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-mode {
            padding: 8px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .mode-text {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            min-width: 80px;
        }

        .play-mode.active {
            opacity: 1;
            color: #f76cc6;
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
                min-height: 100vh;
            }

            .container {
                padding: 10px 5px;
                width: 100%;
                margin-bottom: 180px;
            }

            .main-content {
                grid-template-columns: 1fr;
                padding: 10px 5px;
                width: 100%;
                margin: 0;
                overflow: hidden;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding-right: 0;
                padding-bottom: 20px;
                width: 100%;
                box-sizing: border-box;
            }

            .play-mode-container {
                position: static;
                order: 1;
                margin: 5px auto;
                min-width: unset;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
            }

            body {
                padding-bottom: 140px;
                overflow-x: hidden;
            }

            .player-controls-inner {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }

            .control-buttons {
                order: 1;
                width: 100%;
                display: flex;
                justify-content: center;
                gap: 25px;
                padding: 10px 0;
            }

            .progress-container {
                order: 0;
                width: 100%;
                margin: 5px 0;
            }

            .volume-control {
                order: 2;
                width: 100%;
                max-width: 200px;
                margin: 10px auto;
            }

            .now-playing-info {
                order: -1;
                width: 100%;
                text-align: center;
                margin-bottom: 10px;
            }

            .platform-select {
                gap: 8px;
                padding: 0 10px;
                margin-bottom: 15px;
            }

            .platform-btn {
                padding: 6px 12px;
                font-size: 13px;
                min-width: auto;
                flex: 1;
            }

            .search-container {
                padding: 0 10px;
                margin-bottom: 15px;
                flex-wrap: nowrap;
            }

            .search-btn {
                padding: 8px 15px;
                white-space: nowrap;
                font-size: 14px;
            }

            .song-item {
                padding: 8px;
                gap: 8px;
                margin: 0 0 8px 0;
                border-radius: 8px;
                width: 100%;
                box-sizing: border-box;
            }

            .control-btn {
                padding: 10px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .player-controls {
                padding: 15px 0;
                background: rgba(0, 0, 0, 0.95);
                height: auto;
                bottom: 0;
                position: fixed;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .player-controls-inner {
                width: 95%;
                padding: 0 10px;
                gap: 12px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .now-playing-info {
                width: 100%;
                text-align: center;
                padding: 5px 0;
                order: 1;
            }

            .progress-container {
                width: 100%;
                order: 2;
                margin: 8px 0;
                min-width: unset;
            }

            .control-buttons {
                width: 100%;
                order: 3;
                display: flex;
                justify-content: center;
                gap: 30px;
                padding: 10px 0;
            }

            .play-mode-container {
                position: absolute;
                left: 15px;
                bottom: 15px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                padding: 6px;
                background: rgba(255, 255, 255, 0.15);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .control-btn svg {
                width: 24px;
                height: 24px;
            }

            .volume-control {
                display: none;
            }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }

        .page-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .page-info {
            color: rgba(255, 255, 255, 0.7);
        }

        .now-playing-info {
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }

        .now-playing-info .song-title {
            font-weight: 500;
            color: white;
        }

        .now-playing-info .song-artist {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .volume-icon {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .volume-icon:hover {
            opacity: 1;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-progress {
            height: 100%;
            background: linear-gradient(90deg, #f76cc6, #a770ef);
            border-radius: 2px;
            width: 100%;
        }

        .progress-container {
            flex: 1;
            min-width: 500px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song-list {
            margin: 0;
            padding: 5px;
        }

        .song-item {
            padding: 8px;
            gap: 8px;
        }

        .song-cover {
            width: 40px;
            height: 40px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #f76cc6;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div>加载中...</div>
    </div>
    <div class="container">
        <header>
            <h1>音乐播放器</h1>
            <p>本地音乐库 + 在线音乐搜索</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="library-section">
                    <h3>我的音乐库</h3>
                    <div class="upload-area" id="uploadArea">
                        <p>点击或拖拽音乐文件到这里</p>
                        <input type="file" id="fileInput" hidden multiple accept="audio/*">
                    </div>
                    <div class="song-list" id="localSongList">
                        <!-- 本地音乐列表将在这里动态生成 -->
                    </div>
                </div>
            </div>

            <div class="content">
                <div class="platform-select">
                    <button class="platform-btn active" data-platform="netease">网易云音乐</button>
                    <button class="platform-btn" data-platform="kugou">酷狗音乐</button>
                    <button class="platform-btn" data-platform="kuwo">波点音乐</button>
                </div>

                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="搜索音乐...">
                    <button class="search-btn" onclick="searchMusic()">搜索</button>
                </div>

                <div class="song-list" id="searchResults">
                    <!-- 搜索结果将在这里动态生成 -->
                </div>
            </div>
        </div>

        <div class="player-controls">
            <div class="player-controls-inner">
                <div class="play-mode-container">
                    <button class="play-mode" id="playMode">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="modeIcon">
                            <path d="M19 9H2v2h17V9zm0-4H2v2h17V5zM2 15h13v-2H2v2zm15-2v6l5-3-5-3z"/>
                        </svg>
                    </button>
                    <span class="mode-text" id="modeText">列表循环</span>
                </div>
                <div class="control-buttons">
                    <button class="control-btn" onclick="playPrevious()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="control-btn" id="playPauseBtn" onclick="togglePlay()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn" onclick="playNext()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>
                <div class="progress-container">
                    <span class="time-info" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <span class="time-info" id="duration">0:00</span>
                </div>
                <div class="volume-control">
                    <div class="volume-icon" onclick="toggleMute()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="volumeIcon">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z'"/>
                        </svg>
                    </div>
                    <div class="volume-slider" id="volumeSlider">
                        <div class="volume-progress" id="volumeProgress"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 音乐播放器的核心功能将在这里实现
        let currentPlatform = 'netease';
        let currentPlayMode = 'loop'; // 'list', 'loop', 'single'
        let audioPlayer = new Audio();
        let playlist = [];
        let currentIndex = 0;

        // 平台切换
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlatform = btn.dataset.platform;
            });
        });

        // 文件上传处理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 255, 0.1)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'none';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'none';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('audio/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const fileName = file.name.replace(/\.[^/.]+$/, "");
                        const parts = fileName.split(' - ');
                        const song = {
                            songname: parts.length > 1 ? parts[1] : fileName,
                            name: parts.length > 1 ? parts[0] : '本地音乐',
                            src: e.target.result,
                            isLocal: true,
                            cover: 'default-cover.jpg'
                        };
                        // 将音乐数据转换为 Blob URL
                        const blob = dataURItoBlob(e.target.result);
                        song.src = URL.createObjectURL(blob);
                        addToLibrary(song);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // 添加辅助函数：将 Data URI 转换为 Blob
        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }

        async function searchMusic() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            currentPage = 1; // 重置页码
            await fetchSearchResults(keyword, currentPage);
        }

        async function fetchSearchResults(keyword, page) {
            const platformUrls = {
                'netease': 'https://api.xingzhige.com/API/NetEase_CloudMusic_new/',
                'kugou': 'https://api.xingzhige.com/API/Kugou_GN_new/',
                'kuwo': 'https://api.xingzhige.com/API/Kuwo_BD_new/'
            };

            try {
                const response = await fetch(`${platformUrls[currentPlatform]}?name=${encodeURIComponent(keyword)}&page=${page}&pagesize=30`);
                const data = await response.json();
                displaySearchResults(data.data);
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }

        async function getSongUrl(song, index) {
            const platformUrls = {
                'netease': 'https://api.xingzhige.com/API/NetEase_CloudMusic_new/',
                'kugou': 'https://api.xingzhige.com/API/Kugou_GN_new/',
                'kuwo': 'https://api.xingzhige.com/API/Kuwo_BD_new/'
            };

            try {
                let url = platformUrls[currentPlatform];
                switch(currentPlatform) {
                    case 'kugou':
                        url += `?name=${encodeURIComponent(song.songname)}&hash=${song.FileHash}`;
                        break;
                    case 'kuwo':
                        url += `?name=${encodeURIComponent(song.songname)}&rid=${song.rid}`;
                        break;
                    default: // 网易云音乐
                        url += `?name=${encodeURIComponent(song.songname)}&n=${index + 1}`;
                }

                console.log('请求URL:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('API返回数据:', data);

                // 针对不同平台处理返回数据
                if (data.code === 0 || data.code === 200) {
                    if (currentPlatform === 'kugou' && data.data?.play_url) {
                        return data.data.play_url;
                    } else if (currentPlatform === 'kuwo' && data.data?.url) {
                        return data.data.url;
                    } else if (data.data?.src) {
                        return data.data.src;
                    }
                }
                throw new Error(data.msg || '获取音乐链接失败');
            } catch (error) {
                console.error('获取音乐链接失败:', error);
                showMessage(error.message);
                return null;
            }
        }

        function displaySearchResults(songs) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '';

            songs.forEach((song, index) => {
                const songElement = createSongElement(song, index);
                searchResults.appendChild(songElement);
            });

            // 添加分页控制
            const paginationDiv = document.createElement('div');
            paginationDiv.className = 'pagination';
            paginationDiv.innerHTML = `
                <button onclick="changePage(-1)" class="page-btn">上一页</button>
                <span class="page-info">第 ${currentPage} 页</span>
                <button onclick="changePage(1)" class="page-btn">下一页</button>
            `;
            searchResults.appendChild(paginationDiv);
        }

        function createSongElement(song, index) {
            const div = document.createElement('div');
            div.className = 'song-item';
            // 保存必要的音乐信息
            div.dataset.songInfo = JSON.stringify({
                songname: song.songname,
                name: song.name,
                FileHash: song.FileHash || '',
                rid: song.rid || ''
            });

            const songHtml = `
                <img src="${song.cover}" class="song-cover" onerror="this.src='default-cover.jpg'">
                <div class="song-info">
                    <div class="song-title">${song.songname}</div>
                    <div class="song-artist">${song.name}</div>
                </div>
                <div class="song-controls">
                    <button class="control-btn play-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn add-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </button>
                </div>
            `;
            div.innerHTML = songHtml;
            
            // 添加事件监听器
            div.querySelector('.play-btn').addEventListener('click', () => {
                const songInfo = JSON.parse(div.dataset.songInfo);
                playSong(songInfo, index);
            });
            div.querySelector('.add-btn').addEventListener('click', () => addToLibrary(song));
            
            return div;
        }

        async function playSong(song, index) {
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.style.display = 'flex';
            
            try {
                console.log('播放歌曲:', song);
                const url = await getSongUrl(song, index);
                if (url) {
                    // 创建新的Audio对象以确保URL更新
                    audioPlayer.src = '';
                    audioPlayer.src = url;
                    audioPlayer.load();
                    const playPromise = audioPlayer.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.error('播放失败:', error);
                            showMessage('播放失败，请尝试其他歌曲');
                        });
                    }
                    updatePlayButton(true);
                    currentSong = song;
                    updateNowPlaying(song);
                }
            } catch (error) {
                console.error('播放失败:', error);
                showMessage('播放失败，请尝试其他歌曲');
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function saveLibrary() {
            const songs = Array.from(document.getElementById('localSongList').children).map(element => {
                const song = {
                    songname: element.querySelector('.song-title').textContent,
                    name: element.querySelector('.song-artist').textContent,
                    cover: element.querySelector('.song-cover').src,
                    isLocal: element.querySelector('.song-cover').src.includes('default-cover.jpg'),
                };
                if (song.isLocal) {
                    // 将音乐数据转换为 Base64 字符串存储
                    const audio = new Audio(element.dataset.src || element.querySelector('.play-btn').dataset.src);
                    song.src = audio.src;
                }
                return song;
            });
            localStorage.setItem('musicLibrary', JSON.stringify(songs));
        }

        function addToLibrary(song) {
            const libraryList = document.getElementById('localSongList');
            const songElement = document.createElement('div');
            songElement.className = 'song-item';
            
            if (song.isLocal) {
                songElement.dataset.src = song.src;
            }

            const songHtml = `
                <img src="${song.isLocal ? 'default-cover.jpg' : song.cover}" class="song-cover" onerror="this.src='default-cover.jpg'">
                <div class="song-info">
                    <div class="song-title">${song.songname}</div>
                    <div class="song-artist">${song.name}</div>
                </div>
                <div class="song-controls">
                    <button class="control-btn play-btn" ${song.isLocal ? `data-src="${song.src}"` : ''}>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn remove-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13H5v-2h14v2z"/>
                        </svg>
                    </button>
                </div>
            `;
            songElement.innerHTML = songHtml;

            songElement.querySelector('.play-btn').addEventListener('click', () => {
                if (song.isLocal) {
                    const src = song.src || songElement.dataset.src || songElement.querySelector('.play-btn').dataset.src;
                    audioPlayer.src = src;
                    audioPlayer.play();
                } else {
                    playSong(song, 0);
                }
                updatePlayButton(true);
                updateNowPlaying(song);
            });

            songElement.querySelector('.remove-btn').addEventListener('click', () => {
                removeFromLibrary(songElement);
            });

            libraryList.appendChild(songElement);
            saveLibrary();
        }

        function removeFromLibrary(songElement) {
            songElement.remove();
            saveLibrary();
        }

        // 分页功能
        let currentPage = 1;
        async function changePage(delta) {
            currentPage = Math.max(1, currentPage + delta);
            const keyword = document.getElementById('searchInput').value.trim();
            if (keyword) {
                await fetchSearchResults(keyword, currentPage);
            }
        }

        // 播放控制
        function togglePlay() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                updatePlayButton(true);
            } else {
                audioPlayer.pause();
                updatePlayButton(false);
            }
        }

        function updatePlayButton(isPlaying) {
            const playPauseBtn = document.getElementById('playPauseBtn');
            playPauseBtn.innerHTML = isPlaying ? 
                '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' :
                '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        }

        // 进度条更新
        audioPlayer.addEventListener('timeupdate', () => {
            const progress = document.getElementById('progress');
            const currentTime = document.getElementById('currentTime');
            const duration = document.getElementById('duration');

            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = `${percent}%`;

            currentTime.textContent = formatTime(audioPlayer.currentTime);
            duration.textContent = formatTime(audioPlayer.duration);
        });

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // 播放模式切换
        document.getElementById('playMode').addEventListener('click', () => {
            const modeBtn = document.getElementById('playMode');
            const modeIcon = document.getElementById('modeIcon');
            const modeText = document.getElementById('modeText');

            currentPlayMode = currentPlayMode === 'loop' ? 'single' : 'loop';
            modeBtn.classList.toggle('active');
            modeIcon.innerHTML = `<path d="${modeIcons[currentPlayMode]}"/>`;
            modeText.textContent = modeTexts[currentPlayMode];
        });

        // 播放模式图标
        const modeIcons = {
            loop: 'M19 9H2v2h17V9zm0-4H2v2h17V5zM2 15h13v-2H2v2zm15-2v6l5-3-5-3z',
            single: 'M17 17H7V14L3 18L7 22V19H19V13H17M7 7H17V10L21 6L17 2V5H5V11H7V7ZM13 12V9H12L10 10V11H11.5V15H13V12Z'
        };

        // 播放模式文字
        const modeTexts = {
            loop: '列表循环',
            single: '单曲循环'
        };

        // 音频播放结束事件处理
        audioPlayer.addEventListener('ended', () => {
            switch (currentPlayMode) {
                case 'single':
                    // 单曲循环
                    audioPlayer.currentTime = 0;
                    audioPlayer.play();
                    break;
                case 'loop':
                    // 列表循环
                    playNext(true);
                    break;
                case 'list':
                    // 列表播放
                    playNext(false);
                    break;
            }
        });

        function playNext(isLoop = false) {
            const songList = document.getElementById('localSongList').children;
            if (songList.length === 0) return;

            let currentSongElement = Array.from(songList).find(el => 
                el.querySelector('.song-title').textContent === currentSong?.songname
            );

            let nextElement;
            if (currentSongElement) {
                nextElement = currentSongElement.nextElementSibling;
                if (!nextElement && isLoop) {
                    nextElement = songList[0];
                }
            } else {
                nextElement = songList[0];
            }

            if (nextElement) {
                nextElement.querySelector('.play-btn').click();
            }
        }

        function playPrevious() {
            const songList = document.getElementById('localSongList').children;
            if (songList.length === 0) return;

            let currentSongElement = Array.from(songList).find(el => 
                el.querySelector('.song-title').textContent === currentSong?.songname
            );

            let prevElement;
            if (currentSongElement) {
                prevElement = currentSongElement.previousElementSibling;
                if (!prevElement && currentPlayMode === 'loop') {
                    prevElement = songList[songList.length - 1];
                }
            } else {
                prevElement = songList[songList.length - 1];
            }

            if (prevElement) {
                prevElement.querySelector('.play-btn').click();
            }
        }

        // 初始化时加载音乐库
        document.addEventListener('DOMContentLoaded', () => {
            const savedLibrary = localStorage.getItem('musicLibrary');
            if (savedLibrary) {
                const library = JSON.parse(savedLibrary);
                library.forEach(song => {
                    if (song.isLocal) {
                        song.cover = 'default-cover.jpg';
                        // 从 Base64 字符串恢复 Blob URL
                        if (song.src && song.src.startsWith('data:')) {
                            const blob = dataURItoBlob(song.src);
                            song.src = URL.createObjectURL(blob);
                        }
                    }
                    addToLibrary(song);
                });
            }
        });

        // 修改进度条相关代码
        const progressBar = document.getElementById('progressBar');
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        // 添加拖拽功能
        let isDragging = false;
        progressBar.addEventListener('mousedown', () => {
            isDragging = true;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                let percent = (e.clientX - rect.left) / rect.width;
                percent = Math.max(0, Math.min(1, percent));
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateNowPlaying(song) {
            const nowPlayingTitle = document.createElement('div');
            nowPlayingTitle.className = 'now-playing-info';
            nowPlayingTitle.innerHTML = `
                <span class="song-title">${song.songname}</span>
                <span class="song-artist">${song.name}</span>
            `;
            
            const oldInfo = document.querySelector('.now-playing-info');
            if (oldInfo) oldInfo.remove();
            
            const playerControls = document.querySelector('.player-controls');
            playerControls.insertBefore(nowPlayingTitle, playerControls.firstChild);
        }

        // 音量控制
        let lastVolume = 1;
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeProgress = document.getElementById('volumeProgress');
        const volumeIcon = document.getElementById('volumeIcon');

        function updateVolumeUI(volume) {
            volumeProgress.style.width = `${volume * 100}%`;
            // 更新音量图标
            const path = volume === 0 ? 
                'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z' :
                volume < 0.5 ?
                'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z' :
                'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
            volumeIcon.innerHTML = `<path d="${path}"/>`;
        }

        volumeSlider.addEventListener('click', (e) => {
            const rect = volumeSlider.getBoundingClientRect();
            const volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audioPlayer.volume = volume;
            lastVolume = volume;
            updateVolumeUI(volume);
        });

        function toggleMute() {
            if (audioPlayer.volume > 0) {
                lastVolume = audioPlayer.volume;
                audioPlayer.volume = 0;
            } else {
                audioPlayer.volume = lastVolume;
            }
            updateVolumeUI(audioPlayer.volume);
        }
    </script>
</body>
</html>
